# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# AWS Configuration (REQUIRED - Replace with your actual values)
aws.access-key-id=${AWS_ACCESS_KEY_ID:your-access-key-id}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:your-secret-access-key}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET:your-bucket-name}

# Logging
logging.level.com.videoupload=INFO
logging.level.software.amazon.awssdk=WARN

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Security
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN